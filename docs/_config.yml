# Jekyll configuration for GitHub Pages
# Site Settings
title: "Kugelpos Backend Documentation"
description: "API and architecture documentation for the Kugelpos POS backend system"

# IMPORTANT: baseurl must match your GitHub Pages sub-path
# Since it's hosted at hunaifei-trec.github.io/kugelpos-backend/
baseurl: "/kugelpos-backend"
url: "https://hunaifei-trec.github.io"

# Theme - use the GitHub Pages supported theme
theme: minima

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Include README.md files so Jekyll processes them
include:
  - "*.md"

# Exclude non-docs files from Jekyll build
exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
