site_name: Kugelpos Backend Documentation
site_url: https://hunaifei-trec.github.io/kugelpos-backend/
site_description: API and architecture documentation for the Kugelpos POS backend system
site_author: hunaifei-trec

docs_dir: docs
site_dir: site

repo_name: hunaifei-trec/kugelpos-backend
repo_url: https://github.com/hunaifei-trec/kugelpos-backend
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search:
      lang:
        - en
        - ja

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md

  - English:
    - Overview: en/README.md
    - General:
      - Architecture: en/general/architecture.md
      - Configuration Priority: en/general/configuration-priority.md
      - Design Patterns: en/general/design_patterns.md
      - Error Codes: en/general/error_code_spec.md
      - HTTP Communication: en/general/http_communication.md
      - Dapr Components: en/general/dapr_components.md
      - MkDocs vs Jekyll: en/general/mkdocs-vs-jekyll.md
    - Common Functions: en/commons/common-function-spec.md
    - Account Service:
      - API Specification: en/account/api-specification.md
      - Model Specification: en/account/model-specification.md
    - Cart Service:
      - API Specification: en/cart/api-specification.md
      - Model Specification: en/cart/model-specification.md
    - Journal Service:
      - API Specification: en/journal/api-specification.md
      - Model Specification: en/journal/model-specification.md
    - Master Data Service:
      - API Specification: en/master-data/api-specification.md
      - Model Specification: en/master-data/model-specification.md
    - Report Service:
      - API Specification: en/report/api-specification.md
      - Model Specification: en/report/model-specification.md
    - Stock Service:
      - API Specification: en/stock/api-specification.md
      - Model Specification: en/stock/model-specification.md
      - Snapshot Specification: en/stock/snapshot-specification.md
      - WebSocket Specification: en/stock/websocket-specification.md
    - Terminal Service:
      - API Specification: en/terminal/api-specification.md
      - Model Specification: en/terminal/model-specification.md

  - 日本語:
    - 概要: ja/README.md
    - 全般:
      - アーキテクチャ: ja/general/architecture.md
      - 設定優先度: ja/general/configuration-priority.md
      - 設計パターン: ja/general/design_patterns.md
      - エラーコード: ja/general/error_code_spec.md
      - HTTP通信: ja/general/http_communication.md
      - Daprコンポーネント: ja/general/dapr_components.md
    - 共通関数: ja/commons/common-function-spec.md
    - アカウントサービス:
      - API仕様書: ja/account/api-specification.md
      - モデル仕様書: ja/account/model-specification.md
    - カートサービス:
      - API仕様書: ja/cart/api-specification.md
      - モデル仕様書: ja/cart/model-specification.md
    - ジャーナルサービス:
      - API仕様書: ja/journal/api-specification.md
      - モデル仕様書: ja/journal/model-specification.md
    - マスターデータサービス:
      - API仕様書: ja/master-data/api-specification.md
      - モデル仕様書: ja/master-data/model-specification.md
    - レポートサービス:
      - API仕様書: ja/report/api-specification.md
      - モデル仕様書: ja/report/model-specification.md
    - 在庫サービス:
      - API仕様書: ja/stock/api-specification.md
      - モデル仕様書: ja/stock/model-specification.md
